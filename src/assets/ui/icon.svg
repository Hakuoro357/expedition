<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="iconBg" cx="50%" cy="30%">
      <stop offset="0%" style="stop-color:#E8D5A4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C17A2E;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#F5F1E8;stop-opacity:0.95" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#iconBg)"/>

  <!-- Border ring -->
  <circle cx="256" cy="256" r="245" fill="none" stroke="#8B6914" stroke-width="8"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#2C4A3E" stroke-width="2" opacity="0.5"/>

  <!-- Playing card base -->
  <g transform="translate(120, 90)">
    <!-- Card shadow -->
    <rect x="0" y="5" width="272" height="360" rx="16" ry="16" fill="#000" opacity="0.15"/>

    <!-- Main card -->
    <rect x="0" y="0" width="272" height="360" rx="16" ry="16" fill="url(#cardGrad)" stroke="#8B6914" stroke-width="3"/>

    <!-- Card border inner -->
    <rect x="8" y="8" width="256" height="344" rx="12" ry="12" fill="none" stroke="#C17A2E" stroke-width="2" opacity="0.7"/>

    <!-- Card index - top left (King) -->
    <g transform="translate(16, 16)">
      <text x="0" y="20" font-size="24" font-weight="bold" font-family="serif" fill="#C17A2E">K</text>
      <text x="0" y="38" font-size="18" font-family="serif" fill="#C17A2E">♦</text>
    </g>

    <!-- Card index - bottom right (King rotated) -->
    <g transform="translate(256, 344)" text-anchor="end">
      <text x="0" y="20" font-size="24" font-weight="bold" font-family="serif" fill="#C17A2E" transform="rotate(180)">K</text>
      <text x="0" y="38" font-size="18" font-family="serif" fill="#C17A2E" transform="rotate(180)">♦</text>
    </g>

    <!-- Card center design - portrait style face card -->
    <g transform="translate(136, 120)">
      <!-- Face -->
      <circle cx="0" cy="0" r="35" fill="#F5F1E8" stroke="#C17A2E" stroke-width="2"/>

      <!-- Crown -->
      <path d="M -30,-40 L -15,-55 L 0,-50 L 15,-55 L 30,-40 Z" fill="#C17A2E" stroke="#8B6914" stroke-width="1.5"/>
      <circle cx="-15" cy="-53" r="4" fill="#E8D5A4"/>
      <circle cx="0" cy="-48" r="4" fill="#E8D5A4"/>
      <circle cx="15" cy="-53" r="4" fill="#E8D5A4"/>

      <!-- Head -->
      <ellipse cx="0" cy="5" rx="20" ry="25" fill="#E8D5A4" stroke="#C17A2E" stroke-width="1"/>

      <!-- Eyes -->
      <circle cx="-8" cy="-5" r="3" fill="#2C4A3E"/>
      <circle cx="8" cy="-5" r="3" fill="#2C4A3E"/>

      <!-- Beard/details -->
      <path d="M -12,10 Q 0,18 12,10" stroke="#C17A2E" stroke-width="1.5" fill="none" opacity="0.6"/>

      <!-- Compass overlay on chest -->
      <g transform="translate(0, 30)" opacity="0.8">
        <circle cx="0" cy="0" r="16" fill="none" stroke="#C17A2E" stroke-width="1.5"/>
        <line x1="0" y1="-12" x2="0" y2="-14" stroke="#C17A2E" stroke-width="1.5"/>
        <line x1="12" y1="0" x2="14" y2="0" stroke="#8B6914" stroke-width="1"/>
        <line x1="0" y1="12" x2="0" y2="14" stroke="#8B6914" stroke-width="1"/>
        <line x1="-12" y1="0" x2="-14" y2="0" stroke="#8B6914" stroke-width="1"/>
        <polygon points="0,-8 -2,-3 0,-5 2,-3" fill="#C17A2E"/>
        <circle cx="0" cy="0" r="4" fill="#C17A2E" opacity="0.6"/>
      </g>
    </g>

    <!-- Decorative corner flourishes -->
    <g opacity="0.5">
      <line x1="16" y1="16" x2="40" y2="16" stroke="#C17A2E" stroke-width="1.5"/>
      <line x1="16" y1="16" x2="16" y2="40" stroke="#C17A2E" stroke-width="1.5"/>

      <line x1="256" y1="16" x2="232" y2="16" stroke="#C17A2E" stroke-width="1.5"/>
      <line x1="256" y1="16" x2="256" y2="40" stroke="#C17A2E" stroke-width="1.5"/>

      <line x1="16" y1="344" x2="40" y2="344" stroke="#C17A2E" stroke-width="1.5"/>
      <line x1="16" y1="344" x2="16" y2="320" stroke="#C17A2E" stroke-width="1.5"/>

      <line x1="256" y1="344" x2="232" y2="344" stroke="#C17A2E" stroke-width="1.5"/>
      <line x1="256" y1="344" x2="256" y2="320" stroke="#C17A2E" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Accent dots around border -->
  <g fill="#2C4A3E" opacity="0.6">
    <circle cx="256" cy="40" r="6"/>
    <circle cx="420" cy="256" r="6"/>
    <circle cx="256" cy="472" r="6"/>
    <circle cx="92" cy="256" r="6"/>
  </g>
</svg>

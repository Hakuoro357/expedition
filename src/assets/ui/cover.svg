<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coverBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B896;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C4A3E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.98" />
      <stop offset="100%" style="stop-color:#F5F1E8;stop-opacity:0.98" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="6" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#coverBg)"/>

  <!-- Left side - Expedition Map -->
  <g clip-path="url(#leftClip)">
    <!-- Map background -->
    <rect x="0" y="0" width="600" height="630" fill="#1A2E2B"/>

    <!-- Map grid overlay -->
    <g opacity="0.15" stroke="#D4B896" stroke-width="1">
      <line x1="100" y1="0" x2="100" y2="630"/>
      <line x1="200" y1="0" x2="200" y2="630"/>
      <line x1="300" y1="0" x2="300" y2="630"/>
      <line x1="400" y1="0" x2="400" y2="630"/>
      <line x1="500" y1="0" x2="500" y2="630"/>
      <line x1="0" y1="100" x2="600" y2="100"/>
      <line x1="0" y1="200" x2="600" y2="200"/>
      <line x1="0" y1="300" x2="600" y2="300"/>
      <line x1="0" y1="400" x2="600" y2="400"/>
      <line x1="0" y1="500" x2="600" y2="500"/>
    </g>

    <!-- Mountain terrain -->
    <g opacity="0.5" fill="none" stroke="#8B6914" stroke-width="2">
      <path d="M 50 400 L 100 250 L 150 350 L 200 200 L 250 300 L 300 150 L 350 280 L 400 180 L 450 320 L 500 200 L 550 350 L 600 250"/>
      <path d="M 30 500 L 80 350 L 130 450 L 180 320 L 230 420 L 280 280 L 330 400 L 380 300 L 430 420 L 480 320 L 530 450 L 580 360 L 600 450"/>
    </g>

    <!-- Route line with points -->
    <g opacity="0.6">
      <path d="M 80 450 Q 150 380 220 400 T 350 350 T 450 420 T 550 300" stroke="#C17A2E" stroke-width="3" fill="none" stroke-linecap="round"/>

      <!-- Route markers -->
      <circle cx="80" cy="450" r="8" fill="#C17A2E"/>
      <circle cx="150" cy="380" r="6" fill="#E8D5A4"/>
      <circle cx="220" cy="400" r="6" fill="#E8D5A4"/>
      <circle cx="280" cy="370" r="6" fill="#E8D5A4"/>
      <circle cx="350" cy="350" r="6" fill="#E8D5A4"/>
      <circle cx="420" cy="400" r="6" fill="#E8D5A4"/>
      <circle cx="450" cy="420" r="7" fill="#C17A2E"/>
      <circle cx="520" cy="350" r="6" fill="#E8D5A4"/>
      <circle cx="550" cy="300" r="8" fill="#C17A2E"/>
    </g>

    <!-- Compass rose decoration -->
    <g transform="translate(480, 120)" opacity="0.4">
      <circle cx="0" cy="0" r="50" fill="none" stroke="#D4B896" stroke-width="1"/>
      <polygon points="0,-40 -5,-15 0,-20 5,-15" fill="#C17A2E"/>
      <polygon points="40,0 15,-5 20,0 15,5" fill="#8B6914"/>
      <polygon points="0,40 -5,15 0,20 5,15" fill="#8B6914"/>
      <polygon points="-40,0 -15,-5 -20,0 -15,5" fill="#8B6914"/>
      <circle cx="0" cy="0" r="8" fill="#D4B896" opacity="0.6"/>
    </g>

    <!-- Expedition text overlay -->
    <text x="300" y="80" text-anchor="middle" font-size="36" font-family="serif" fill="#D4B896" opacity="0.3" font-style="italic">Expedition Map</text>
  </g>

  <!-- Right side - Playing cards -->
  <g transform="translate(600, 0)">
    <!-- Cards background -->
    <rect width="600" height="630" fill="#E8D5A4" opacity="0.9"/>

    <!-- Subtle background pattern -->
    <g opacity="0.1" stroke="#8B6914" stroke-width="1">
      <circle cx="100" cy="100" r="30"/>
      <circle cx="500" cy="150" r="40"/>
      <circle cx="150" cy="450" r="35"/>
      <circle cx="450" cy="520" r="45"/>
    </g>

    <!-- Fan of playing cards -->
    <!-- Card 1 (Ace of Spades) -->
    <g transform="translate(60, 120) rotate(-25)" filter="url(#shadow)">
      <rect width="140" height="200" rx="8" fill="url(#cardGrad)" stroke="#2C4A3E" stroke-width="2.5"/>
      <rect x="6" y="6" width="128" height="188" rx="6" fill="none" stroke="#C17A2E" stroke-width="1" opacity="0.6"/>

      <!-- Index -->
      <text x="12" y="28" font-size="18" font-weight="bold" font-family="serif" fill="#2C4A3E">A</text>
      <text x="12" y="48" font-size="20" font-family="serif" fill="#2C4A3E">♠</text>

      <!-- Center spade -->
      <text x="70" y="110" text-anchor="middle" font-size="60" font-family="serif" fill="#2C4A3E" opacity="0.2">♠</text>

      <!-- Index bottom right rotated -->
      <g transform="translate(134, 194)" text-anchor="end">
        <text x="0" y="-6" font-size="18" font-weight="bold" font-family="serif" fill="#2C4A3E" transform="rotate(180)">A</text>
        <text x="0" y="14" font-size="20" font-family="serif" fill="#2C4A3E" transform="rotate(180)">♠</text>
      </g>
    </g>

    <!-- Card 2 (King of Hearts) -->
    <g transform="translate(150, 80) rotate(-5)" filter="url(#shadow)">
      <rect width="140" height="200" rx="8" fill="url(#cardGrad)" stroke="#C17A2E" stroke-width="2.5"/>
      <rect x="6" y="6" width="128" height="188" rx="6" fill="none" stroke="#C17A2E" stroke-width="1" opacity="0.6"/>

      <!-- Index -->
      <text x="12" y="28" font-size="18" font-weight="bold" font-family="serif" fill="#C17A2E">K</text>
      <text x="12" y="48" font-size="20" font-family="serif" fill="#C17A2E">♥</text>

      <!-- Center heart -->
      <text x="70" y="110" text-anchor="middle" font-size="60" font-family="serif" fill="#C17A2E" opacity="0.15">♥</text>

      <!-- Portrait style crown and face -->
      <circle cx="70" cy="100" r="20" fill="none" stroke="#C17A2E" stroke-width="1" opacity="0.5"/>
      <path d="M 50,85 L 60,75 L 70,78 L 80,75 L 90,85 Z" fill="none" stroke="#C17A2E" stroke-width="1" opacity="0.5"/>

      <!-- Index bottom right -->
      <g transform="translate(134, 194)" text-anchor="end">
        <text x="0" y="-6" font-size="18" font-weight="bold" font-family="serif" fill="#C17A2E" transform="rotate(180)">K</text>
        <text x="0" y="14" font-size="20" font-family="serif" fill="#C17A2E" transform="rotate(180)">♥</text>
      </g>
    </g>

    <!-- Card 3 (Queen of Diamonds) -->
    <g transform="translate(270, 110) rotate(15)" filter="url(#shadow)">
      <rect width="140" height="200" rx="8" fill="url(#cardGrad)" stroke="#C17A2E" stroke-width="2.5"/>
      <rect x="6" y="6" width="128" height="188" rx="6" fill="none" stroke="#C17A2E" stroke-width="1" opacity="0.6"/>

      <!-- Index -->
      <text x="12" y="28" font-size="18" font-weight="bold" font-family="serif" fill="#C17A2E">Q</text>
      <text x="12" y="48" font-size="20" font-family="serif" fill="#C17A2E">♦</text>

      <!-- Center diamond -->
      <text x="70" y="110" text-anchor="middle" font-size="60" font-family="serif" fill="#C17A2E" opacity="0.15">♦</text>

      <!-- Index bottom right -->
      <g transform="translate(134, 194)" text-anchor="end">
        <text x="0" y="-6" font-size="18" font-weight="bold" font-family="serif" fill="#C17A2E" transform="rotate(180)">Q</text>
        <text x="0" y="14" font-size="20" font-family="serif" fill="#C17A2E" transform="rotate(180)">♦</text>
      </g>
    </g>

    <!-- Title area with game name -->
    <g transform="translate(0, 350)">
      <!-- Background box -->
      <rect x="20" y="20" width="560" height="240" rx="12" fill="#FFFFFF" opacity="0.85" filter="url(#shadow)"/>

      <!-- Title -->
      <text x="300" y="110" text-anchor="middle" font-size="52" font-family="serif" font-weight="bold" fill="#2C4A3E">Solitaire:</text>
      <text x="300" y="170" text-anchor="middle" font-size="52" font-family="serif" font-weight="bold" fill="#C17A2E">Expedition</text>

      <!-- Subtitle -->
      <text x="300" y="210" text-anchor="middle" font-size="18" font-family="serif" fill="#8B6914" opacity="0.7" font-style="italic">A Calm Journey Through Cards</text>

      <!-- Decorative line -->
      <line x1="100" y1="230" x2="500" y2="230" stroke="#C17A2E" stroke-width="2" opacity="0.5"/>
    </g>
  </g>

  <defs>
    <clipPath id="leftClip">
      <rect x="0" y="0" width="600" height="630"/>
    </clipPath>
  </defs>
</svg>

<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- apple-mobile-web-app-capable устанавливает Yandex-обёртка iframe;
         современный стандарт — mobile-web-app-capable. Добавляем его
         явно, чтобы убрать deprecation warning в консоли. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23132220'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='36' font-weight='bold' text-anchor='middle' fill='%23d4a962'%3ES%3C/text%3E%3C/svg%3E" />
    <title>Solitaire: Expedition</title>
    <!-- Регистрируем callback ДО загрузки GamePush SDK — иначе SDK
         вызовет onGPInit синхронно при загрузке скрипта, а наш
         GamePushSdkService ещё не успеет подписаться на него. -->
    <script>window.__gp=null;window.onGPInit=function(gp){window.__gp=gp;};</script>
    <!-- GamePush SDK — единая обёртка для всех платформ (Яндекс, VK,
         CrazyGames, Poki, GameDistribution и др.). -->
    <script src="https://gamepush.com/sdk/game-score.js?projectId=27547&publicToken=9J0DoeYgA6t3O4v0FxtzhxNem1kbTBtb&callback=onGPInit"></script>
  </head>
  <body>
    <div id="app"></div>
    <!-- Экран загрузки — показывается мгновенно до Phaser.
         Прогресс-бар обновляется из BootScene.preload() через
         this.load.on('progress'). Язык определяется по ?lang= или
         navigator.language. BootScene.create() вызывает .remove(). -->
    <div id="loading-screen" style="
      position:fixed;inset:0;z-index:9999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#132220;color:#d4a962;font-family:'Trebuchet MS',Verdana,sans-serif;
    ">
      <img src="./assets/icon-loading.png" alt="" width="64" height="64" style="border-radius:10px;margin-bottom:24px;" />
      <div style="width:200px;height:4px;background:#1e3530;border-radius:2px;overflow:hidden;">
        <div id="loading-bar" style="width:0%;height:100%;background:#d4a962;border-radius:2px;transition:width 0.2s ease-out;animation:fake-progress 4s ease-out forwards;"></div>
        <style>@keyframes fake-progress{0%{width:0%}100%{width:8%}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!--
  Cover 800×470. Safe zone 100..700 × 60..410 (600×350 centered).
  All readable content stays inside. Parchment is full-bleed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 470">
  <defs>
    <radialGradient id="parchment" cx="40%" cy="45%" r="80%">
      <stop offset="0%"  stop-color="#f4e3b2"/>
      <stop offset="55%" stop-color="#dcc079"/>
      <stop offset="100%" stop-color="#8a6a2c"/>
    </radialGradient>
    <linearGradient id="darkFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#0c1517" stop-opacity="0"/>
      <stop offset="25%" stop-color="#0c1517" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#0c1517" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#0c1517" stop-opacity="0.97"/>
    </linearGradient>
    <linearGradient id="topShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#0c1517" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0c1517" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fbf3dc"/>
      <stop offset="100%" stop-color="#dcc594"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#d4aa6a"/>
      <stop offset="100%" stop-color="#8a5a18"/>
    </linearGradient>
    <linearGradient id="compassNlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#e8503a"/>
      <stop offset="50%" stop-color="#c52a1a"/>
      <stop offset="100%" stop-color="#7a1408"/>
    </linearGradient>
    <linearGradient id="compassDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#7a5418"/>
      <stop offset="100%" stop-color="#3d2808"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fbecae"/>
      <stop offset="50%" stop-color="#e7c466"/>
      <stop offset="100%" stop-color="#a07a20"/>
    </linearGradient>
    <linearGradient id="darkInkText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#3a2408"/>
      <stop offset="100%" stop-color="#1a0f02"/>
    </linearGradient>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.9"/></feComponentTransfer>
      <feColorMatrix values="1 0 0 0 1
                             0 1 0 0 0.92
                             0 0 1 0 0.78
                             0 0 0 1 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5"/>
      <feOffset dx="0" dy="5" result="shadow"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
      <feOffset dx="0" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.75"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Parchment full bleed -->
  <rect width="800" height="470" fill="url(#parchment)"/>
  <rect width="800" height="160" fill="url(#topShade)"/>

  <!-- Map decorations on parchment -->
  <g opacity="0.55" stroke="#6b4010" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- mountains -->
    <path d="M 280 110 L 320 72 L 358 110 L 396 70 L 434 110 L 470 80" stroke-width="2.6"/>
    <path d="M 302 110 L 322 90 L 342 110" stroke-width="1.6"/>
    <path d="M 378 110 L 396 92 L 414 110" stroke-width="1.6"/>
    <!-- river -->
    <path d="M 80 290 Q 130 280 170 305 T 250 318 Q 285 308 310 330" stroke-width="2.4"/>
    <path d="M 95 312 Q 145 300 180 326" stroke-width="1.4" stroke-dasharray="3 3"/>
    <!-- forest -->
    <g fill="#6b4010" stroke="none">
      <circle cx="270" cy="180" r="3.4"/>
      <circle cx="288" cy="160" r="3.4"/>
      <circle cx="306" cy="178" r="3.4"/>
      <circle cx="284" cy="198" r="3.4"/>
      <circle cx="320" cy="160" r="3.4"/>
      <circle cx="340" cy="178" r="3.4"/>
    </g>
  </g>

  <!-- expedition route (inside safe zone) -->
  <path d="M 180 360 Q 240 320 280 320 T 350 270 Q 400 230 430 180 T 480 110"
        fill="none" stroke="#8c1d1d" stroke-width="3.6" stroke-dasharray="7 5" opacity="0.92"/>

  <g fill="#8c1d1d" stroke="#3a0808" stroke-width="1.6">
    <circle cx="180" cy="360" r="6"/>
    <circle cx="280" cy="320" r="6"/>
    <circle cx="350" cy="270" r="6"/>
    <circle cx="430" cy="180" r="6"/>
    <circle cx="480" cy="110" r="7"/>
  </g>
  <g transform="translate(480 110)">
    <line x1="0" y1="0" x2="0" y2="-26" stroke="#3a0808" stroke-width="2.2"/>
    <polygon points="0,-26 19,-20 0,-14" fill="#c52a1a" stroke="#3a0808" stroke-width="1"/>
  </g>

  <!-- ===== Compass rose: center (180, 200), radius ≈ 78 → 102..258 x, 122..278 y. Inside safe zone. ===== -->
  <g transform="translate(180 200) scale(0.82)">
    <circle r="92" fill="#f0dba0" fill-opacity="0.9" stroke="#5d4416" stroke-width="3"/>
    <circle r="84" fill="none" stroke="#8a6a2a" stroke-width="1.5" opacity="0.7"/>
    <circle r="48" fill="none" stroke="#8a6a2a" stroke-width="1" opacity="0.55"/>

    <polygon points="0,0 -14,-14 -54,-54 -18,-10" fill="#c8a360" stroke="#5d4416" stroke-width="1"/>
    <polygon points="0,0  14,-14  54,-54  10,-18" fill="#a17a2a" stroke="#5d4416" stroke-width="1"/>
    <polygon points="0,0  14, 14  54, 54  18, 10" fill="#c8a360" stroke="#5d4416" stroke-width="1"/>
    <polygon points="0,0 -14, 14 -54, 54 -10, 18" fill="#a17a2a" stroke="#5d4416" stroke-width="1"/>

    <polygon points="0,0 -14,-10 -85,0 -14,10" fill="url(#compassDark)" stroke="#3d2808" stroke-width="1.4"/>
    <polygon points="0,0  14,-10  85,0  14,10" fill="#a17a2a" stroke="#3d2808" stroke-width="1.4"/>
    <polygon points="0,0 -10, 14 0, 85  10, 14" fill="url(#compassDark)" stroke="#3d2808" stroke-width="1.4"/>

    <polygon points="0,0 -14,-10 0,-90 14,-10" fill="url(#compassNlight)" stroke="#3a0808" stroke-width="1.6"/>

    <circle r="11" fill="#3a0808" stroke="#f0dba0" stroke-width="2"/>
    <circle r="5"  fill="#f0dba0"/>

    <text x="0" y="-100" text-anchor="middle" font-family="Georgia, serif"
          font-size="20" font-weight="bold" fill="#3a0808">N</text>
  </g>

  <!-- ===== Cards fanned: center (200, 360), max y ≈ 405. Inside safe zone. ===== -->
  <g transform="translate(200 360)" filter="url(#softShadow)">
    <g transform="rotate(-18) translate(-32 0)">
      <rect x="-32" y="-58" width="64" height="90" rx="6" fill="url(#cardBack)" stroke="#5d3a0a" stroke-width="2"/>
      <circle cx="0" cy="-12" r="11" fill="none" stroke="#3a0808" stroke-width="1.4" opacity="0.6"/>
      <polygon points="0,-23 -3,-14 0,-17 3,-14" fill="#8c1d1d"/>
    </g>
    <g transform="rotate(-4) translate(0 -8)">
      <rect x="-34" y="-62" width="68" height="96" rx="6" fill="url(#cardFace)" stroke="#5d3a0a" stroke-width="2"/>
      <text x="-24" y="-40" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1b1b1b">A</text>
      <text x="-24" y="-24" font-family="Georgia, serif" font-size="14" fill="#1b1b1b">♠</text>
      <text x="0" y="6" font-family="Georgia, serif" font-size="32" text-anchor="middle" fill="#1b1b1b">♠</text>
      <text x="24" y="26" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1b1b1b" transform="rotate(180 24 26)">A</text>
    </g>
    <g transform="rotate(10) translate(32 -2)">
      <rect x="-34" y="-62" width="68" height="96" rx="6" fill="url(#cardFace)" stroke="#5d3a0a" stroke-width="2"/>
      <text x="-24" y="-40" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#a01818">K</text>
      <text x="-24" y="-24" font-family="Georgia, serif" font-size="14" fill="#a01818">♥</text>
      <text x="0" y="6" font-family="Georgia, serif" font-size="32" text-anchor="middle" fill="#a01818">♥</text>
      <text x="24" y="26" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#a01818" transform="rotate(180 24 26)">K</text>
    </g>
  </g>

  <!-- ===== Title block: dark ink on parchment, with subtle light glow halo ===== -->
  <g transform="translate(485 200)" filter="url(#goldGlow)">
    <text font-family="Georgia, serif" font-size="42" font-weight="bold"
          fill="url(#darkInkText)" letter-spacing="1">Solitaire</text>
    <text y="52" font-family="Georgia, serif" font-size="42" font-weight="bold"
          fill="url(#darkInkText)" letter-spacing="1">Expedition</text>
  </g>

  <!-- gold separator under title -->
  <line x1="485" y1="278" x2="695" y2="278" stroke="#5d4416" stroke-width="2" opacity="0.7"/>

  <!-- subtitle / tagline (RU, short) -->
  <text x="485" y="312" font-family="Georgia, serif" font-size="22" font-weight="600"
        fill="#2a1804" font-style="italic">The Lost Expedition</text>

  <!-- ===== Case stamp top-right (inside safe zone, center (635, 105), radius 38 → x 597..673, y 67..143) ===== -->
  <g transform="translate(635 105) rotate(-8)" filter="url(#softShadow)">
    <circle r="38" fill="#8c1d1d" stroke="#5a0e0e" stroke-width="2.5"/>
    <circle r="32" fill="none" stroke="#f0d2c0" stroke-width="1.2" stroke-opacity="0.7"/>
    <text y="-3" font-family="Georgia, serif" font-size="11" font-weight="bold"
          fill="#f6e6d4" text-anchor="middle" letter-spacing="1">CASE</text>
    <text y="17" font-family="Georgia, serif" font-size="17" font-weight="bold"
          fill="#f6e6d4" text-anchor="middle">47/3</text>
  </g>
</svg>

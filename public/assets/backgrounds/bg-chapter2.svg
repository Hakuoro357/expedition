<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lanternGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#E8D5A4;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#C17A2E;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Night sky background -->
  <rect width="1200" height="800" fill="#1A2E2B"/>

  <!-- Distant stars -->
  <g opacity="0.15" fill="#D4B896">
    <circle cx="100" cy="80" r="1.5"/>
    <circle cx="300" cy="120" r="1"/>
    <circle cx="500" cy="60" r="1.5"/>
    <circle cx="800" cy="100" r="1"/>
    <circle cx="1050" cy="75" r="1.5"/>
    <circle cx="200" cy="150" r="1"/>
    <circle cx="1100" cy="140" r="1"/>
  </g>

  <!-- Far mountains (very dark background) -->
  <g opacity="0.15">
    <polygon points="0,450 200,250 400,450" fill="#8B6914"/>
    <polygon points="300,450 500,200 700,450" fill="#8B6914"/>
    <polygon points="800,450 1000,250 1200,450" fill="#8B6914"/>
  </g>

  <!-- Mid mountains -->
  <g opacity="0.35" fill="#8B6914">
    <polygon points="0,550 250,320 500,550"/>
    <polygon points="400,550 700,280 1000,550"/>
    <polygon points="900,550 1200,350 1200,550"/>
  </g>

  <!-- Main foreground mountains with pass in center -->
  <g fill="#1A2E2B" opacity="0.95">
    <!-- Left peak -->
    <polygon points="0,750 200,300 450,750"/>

    <!-- Pass opening (valley) -->
    <polygon points="400,750 550,450 700,750"/>

    <!-- Right peak -->
    <polygon points="650,750 950,280 1200,750"/>
  </g>

  <!-- Mountain ridges/contours -->
  <g opacity="0.2" stroke="#D4B896" stroke-width="1.5" fill="none">
    <path d="M 0 650 Q 150 600 300 650"/>
    <path d="M 350 700 Q 450 650 550 700"/>
    <path d="M 600 700 Q 750 620 900 700"/>
  </g>

  <!-- Lantern (center top of pass) -->
  <g transform="translate(550, 350)">
    <!-- Lantern glow -->
    <circle cx="0" cy="0" r="120" fill="url(#lanternGlow)"/>

    <!-- Lantern stand -->
    <rect x="-8" y="20" width="16" height="60" fill="#C17A2E" opacity="0.7"/>

    <!-- Lantern body (metal frame) -->
    <g opacity="0.85">
      <!-- Top frame -->
      <rect x="-35" y="0" width="70" height="10" rx="3" fill="none" stroke="#C17A2E" stroke-width="2"/>

      <!-- Side frames -->
      <line x1="-35" y1="0" x2="-35" y2="50" stroke="#C17A2E" stroke-width="1.5"/>
      <line x1="35" y1="0" x2="35" y2="50" stroke="#C17A2E" stroke-width="1.5"/>

      <!-- Front panes (glass) -->
      <rect x="-30" y="5" width="25" height="40" rx="2" fill="#E8D5A4" opacity="0.3" stroke="#C17A2E" stroke-width="1"/>
      <rect x="5" y="5" width="25" height="40" rx="2" fill="#E8D5A4" opacity="0.3" stroke="#C17A2E" stroke-width="1"/>

      <!-- Light reflection -->
      <line x1="-25" y1="10" x2="-20" y2="35" stroke="#E8D5A4" stroke-width="1" opacity="0.4"/>
      <line x1="10" y1="10" x2="15" y2="35" stroke="#E8D5A4" stroke-width="1" opacity="0.4"/>
    </g>

    <!-- Inner light -->
    <circle cx="0" cy="25" r="15" fill="#E8D5A4" opacity="0.5"/>
    <circle cx="0" cy="25" r="10" fill="#E8D5A4" opacity="0.7"/>

    <!-- Bottom of lantern -->
    <ellipse cx="0" cy="50" rx="35" ry="8" fill="#8B6914" opacity="0.5"/>
  </g>

  <!-- Path leading to lantern (converging lines) -->
  <g opacity="0.15" stroke="#D4B896" stroke-width="2" fill="none">
    <line x1="300" y1="750" x2="520" y2="380"/>
    <line x1="900" y1="750" x2="580" y2="380"/>
  </g>

  <!-- Chapter label -->
  <text x="100" y="720" font-size="28" font-family="serif" fill="#D4B896" opacity="0.12" font-style="italic">Mountain Pass</text>

  <!-- Subtle camp elements -->
  <g opacity="0.12">
    <!-- Tent outline left -->
    <polygon points="250,650 280,600 310,650" fill="none" stroke="#C17A2E" stroke-width="1.5"/>

    <!-- Tent outline right -->
    <polygon points="890,650 920,600 950,650" fill="none" stroke="#C17A2E" stroke-width="1.5"/>
  </g>

  <!-- Moon (subtle crescent) -->
  <g transform="translate(1080, 120)" opacity="0.1">
    <circle cx="0" cy="0" r="35" fill="#D4B896"/>
    <circle cx="8" cy="0" r="35" fill="#1A2E2B"/>
  </g>
</svg>

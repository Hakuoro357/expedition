<svg viewBox="0 0 300 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="420" rx="18" fill="#C4985A"/>
  <rect x="10" y="10" width="280" height="400" rx="14" fill="#D4AA6A" opacity="0.5"/>
  <rect x="10" y="10" width="280" height="400" rx="14" fill="none" stroke="#7A5018" stroke-width="3"/>
  <rect x="18" y="18" width="264" height="384" rx="10" fill="none" stroke="#E8C882" stroke-width="1.5" opacity="0.7"/>

  <!-- Compass rose -->
  <g transform="translate(150,210)">
    <circle r="82" fill="none" stroke="#6B4010" stroke-width="2" opacity="0.6"/>
    <circle r="40" fill="none" stroke="#8B5A18" stroke-width="1.5" opacity="0.5"/>

    <!-- N arrow (red) -->
    <polygon points="0,-75 -10,-38 0,-52 10,-38" fill="#8B2A10"/>
    <!-- S arrow -->
    <polygon points="0,75 -10,38 0,52 10,38" fill="#6B4010"/>
    <!-- E arrow -->
    <polygon points="75,0 38,-10 52,0 38,10" fill="#6B4010"/>
    <!-- W arrow -->
    <polygon points="-75,0 -38,-10 -52,0 -38,10" fill="#6B4010"/>

    <!-- Diagonal lines -->
    <line x1="0" y1="-75" x2="0" y2="75" stroke="#8B5A18" stroke-width="1" opacity="0.35"/>
    <line x1="-75" y1="0" x2="75" y2="0" stroke="#8B5A18" stroke-width="1" opacity="0.35"/>
    <line x1="-53" y1="-53" x2="53" y2="53" stroke="#8B5A18" stroke-width="0.8" opacity="0.25"/>
    <line x1="53" y1="-53" x2="-53" y2="53" stroke="#8B5A18" stroke-width="0.8" opacity="0.25"/>

    <!-- Center -->
    <circle r="14" fill="#8B2A10"/>
    <circle r="8" fill="#E8C882"/>

    <!-- Cardinal labels -->
    <text x="0" y="-90" text-anchor="middle" font-size="20" font-family="serif" font-weight="bold" fill="#6B3010">N</text>
    <text x="0" y="112" text-anchor="middle" font-size="16" font-family="serif" fill="#6B4010">S</text>
    <text x="94" y="7" text-anchor="middle" font-size="16" font-family="serif" fill="#6B4010">E</text>
    <text x="-94" y="7" text-anchor="middle" font-size="16" font-family="serif" fill="#6B4010">W</text>
  </g>

  <!-- Corner ornaments -->
  <g stroke="#8B5A18" stroke-width="1.5" opacity="0.6" fill="none">
    <path d="M28,28 L46,28 M28,28 L28,46"/>
    <path d="M272,28 L254,28 M272,28 L272,46"/>
    <path d="M28,392 L46,392 M28,392 L28,374"/>
    <path d="M272,392 L254,392 M272,392 L272,374"/>
  </g>
</svg>
